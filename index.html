<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimberio — Elite Luxury Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('storeCore', () => ({
                scrolled: false, cartOpen: false, detailOpen: false,
                
                products: [
                    { id: 'luna-glow-moon', name: 'LUNA GLOW 3D Moon Lamp', price: 2999, compareAt: 4499, tag: 'LIFESTYLE', img1: 'public/moon-lamp-1.png', img2: 'public/moon-lamp-2.png', img3: 'public/moon-lamp-3.png', currentPreview: 'public/moon-lamp-1.png' },
                    { id: 'cosmic-crystal-orb', name: 'NEBULA 3D Crystal Ball Orb Light', price: 1299, compareAt: 2499, tag: 'LIFESTYLE', img1: 'public/crystal-ball-1.png', img2: 'public/crystal-ball-2.png', currentPreview: 'public/crystal-ball-1.png' },
                    { id: 'lumos-study-hub', name: 'LED Study Lamp with Pen Holder & Phone Stand', price: 2399, compareAt: 3999, tag: 'GADGETS', img1: 'public/study-lamp-1.png', img2: 'public/study-lamp-2.png', currentPreview: 'public/study-lamp-1.png' },
                    { id: 'wild-canopy-feeder', name: 'Waterproof Outdoor Wild Bird Hanging Grains Feeder', price: 1599, compareAt: 2999, tag: 'LIFESTYLE', img1: 'public/bird-feeder-1.png', img2: 'public/bird-feeder-2.png', img3: 'public/bird-feeder-3.png', currentPreview: 'public/bird-feeder-1.png' }
                ],
                tickerItems: ['FREE EXPRESS SHIPPING OVER RS 5,000', 'NEW DROP EVERY 48 HOURS', '30-DAY EASY RETURNS', 'CASH ON DELIVERY AVAILABLE'],
                
                selectedProduct: {}, activeDetailImg: '', cart: [],
                
                customerName: '', customerEmail: '', customerPhone: '', customerAddress: '',
                paymentMethod: 'COD', // 'COD' ya 'CARD'
                orderLoading: false,
                
                init() {
                    window.addEventListener('scroll', () => { this.scrolled = window.scrollY > 20; });
                    if (typeof initialData !== 'undefined' && initialData.products && initialData.products.length > 0) {
                        this.products = initialData.products.map(p => ({ ...p, currentPreview: p.img1 || p.img }));
                    }
                },
                
                get cartCount() { return this.cart.reduce((sum, item) => sum + item.qty, 0); },
                get cartSubtotal() { return this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0); },
                get deliveryCharges() { return this.cartCount === 0 ? 0 : 399; },
                get cartTotal() { return this.cartSubtotal + this.deliveryCharges; },
                
                openQuickView(product) {
                    this.selectedProduct = product; this.activeDetailImg = product.img1 || product.currentPreview; this.detailOpen = true;
                },
                openHeroProduct() {
                    const heroProduct = this.products.find(p => p.id === 'luna-glow-moon') || this.products[0];
                    if (heroProduct) this.openQuickView(heroProduct);
                },
                addToCart(product) {
                    let found = this.cart.find(item => item.id === product.id);
                    if (found) { found.qty++; } else { this.cart.push({ ...product, qty: 1 }); }
                    this.cartOpen = true;
                },
                
                async submitOrder() {
                    if (this.cart.length === 0) { alert('Aapka bag khali hai!'); return; }
                    if (!this.customerName || !this.customerPhone || !this.customerAddress) { alert('Bhai, saari dispatch details fill karein!'); return; }
                    
                    this.orderLoading = true;
                    const orderPayload = {
                        customer: { name: this.customerName, email: this.customerEmail, phone: this.customerPhone, shippingAddress: this.customerAddress },
                        cart: this.cart.map(item => ({ id: item.id, name: item.name, price: item.price, qty: item.qty })),
                        paymentMethod: this.paymentMethod,
                        financialSummary: { subtotal: this.cartSubtotal, deliveryCharges: this.deliveryCharges, finalTotal: this.cartTotal }
                    };

                    try {
                        const response = await fetch('https://rambrio-store-production.up.railway.app/api/checkout', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderPayload)
                        });
                        const result = await response.json();
                        if (response.ok && result.success) {
                            alert('🎉 ORDER PLACED SUCCESSFULLY!');
                            this.cart = []; this.customerName = ''; this.customerEmail = ''; this.customerPhone = ''; this.customerAddress = ''; this.cartOpen = false;
                        } else {
                            alert('⚠️ Backend Error: ' + (result.message || 'Order reject ho gaya.'));
                        }
                    } catch (error) {
                        alert('❌ Connection Error! Server offline hai.');
                    } finally {
                        this.orderLoading = false;
                    }
                }
            }));
        });
    </script>
</head>
<body class="overflow-x-hidden antialiased bg-[#FAF6F0] text-[#0F0F10]">

    <div x-data="storeCore()">
        
        <div class="w-screen overflow-hidden bg-[#0F0F10] text-[#FAF6F0] py-2.5 border-b border-white/5 font-mono text-[9px] font-bold tracking-widest relative z-50">
            <div class="flex whitespace-nowrap animate-marquee gap-12 justify-around">
                <template x-for="ticker in tickerItems"><span class="inline-block" x-text="'// ' + ticker"></span></template>
            </div>
        </div>

        <header class="fixed inset-x-0 top-8 z-40 transition-all duration-500" :class="scrolled ? 'px-4 py-2' : 'px-6 py-4'">
            <div class="mx-auto flex max-w-7xl items-center justify-between border px-8 py-4 bg-[#FAF6F0]/80 backdrop-blur-xl rounded-2xl glowing-navbar">
                <div class="flex items-center gap-2 cursor-pointer group" onclick="window.location.reload()">
                    <div class="bg-[#0F0F10] text-[#FAF6F0] heading-elite text-xs px-2.5 py-1.5 rounded-lg font-black">R.</div>
                    <span class="heading-elite text-xl uppercase tracking-tighter text-[#0F0F10] font-black">RIMBERIO</span>
                </div>
                <div class="flex items-center gap-2">
                    <button @click="cartOpen = true" class="relative grid size-9 place-items-center rounded-full text-[#0F0F10]/80 hover:bg-[#0F0F10]/5">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                        <span x-show="cartCount > 0" class="absolute right-0 top-0 grid size-4.5 place-items-center rounded-full bg-[#EA580C] font-mono text-[9px] text-white font-bold" x-text="cartCount"></span>
                    </button>
                </div>
            </div>
        </header>

        <section class="px-6 py-36 max-w-7xl mx-auto">
            <div class="mb-16"><h2 class="heading-elite text-3xl sm:text-4xl uppercase tracking-tight text-[#0F0F10]">LIVE CATALOG</h2></div>
            <div class="grid grid-cols-1 gap-10 sm:grid-cols-2 lg:grid-cols-2">
                <template x-for="product in products" :key="product.id">
                    <div class="bg-white border border-[#0F0F10]/5 p-6 rounded-[2rem] shadow-sm">
                        <div class="relative aspect-square overflow-hidden rounded-[1.8rem] bg-[#0F0F10]/5 p-3 cursor-pointer" @click="openQuickView(product)">
                            <img :src="product.currentPreview" class="w-full h-full object-cover rounded-[1.5rem]">
                        </div>
                        <div class="mt-6">
                            <h3 class="font-bold text-[#0F0F10] mt-3 text-lg sm:text-xl tracking-tight" x-text="product.name"></h3>
                            <div class="mt-4 flex items-center justify-between border-t border-[#0F0F10]/5 pt-4">
                                <span class="heading-elite text-xl text-[#0F0F10]" x-text="'Rs ' + product.price.toLocaleString()"></span>
                                <button @click="addToCart(product)" class="bg-[#EA580C] text-white font-bold px-6 py-3 rounded-xl text-xs uppercase tracking-wider">ADD TO BAG +</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <div x-show="cartOpen" class="fixed inset-0 z-50 bg-[#0F0F10]/40 backdrop-blur-sm" style="display: none;" x-transition>
            <div @click.away="cartOpen = false" class="absolute right-0 top-0 h-full w-full max-w-md bg-white border-l border-[#0F0F10]/10 flex flex-col shadow-2xl">
                
                <div class="flex justify-between items-center p-6 border-b border-[#0F0F10]/5 shrink-0 bg-white">
                    <h3 class="heading-elite text-lg uppercase tracking-wider text-[#0F0F10]">YOUR BAG (<span x-text="cartCount"></span>)</h3>
                    <button @click="cartOpen = false" class="text-[#0F0F10]/40 hover:text-black font-bold text-xl">✕</button>
                </div>
                
                <div class="flex-1 overflow-y-auto p-6 scroll-smooth">
                    <div class="space-y-3 mb-8">
                        <template x-for="item in cart" :key="item.id">
                            <div class="flex gap-4 bg-[#FAF6F0]/50 border border-[#0F0F10]/5 p-3 rounded-2xl items-center shadow-sm">
                                <img :src="item.img1" class="w-14 h-14 rounded-xl object-cover border border-[#0F0F10]/5">
                                <div class="flex-1">
                                    <h5 class="font-bold text-sm text-[#0F0F10] leading-tight" x-text="item.name"></h5>
                                    <span class="text-xs font-black text-[#EA580C] mt-1 block" x-text="'Rs ' + item.price.toLocaleString() + ' x ' + item.qty"></span>
                                </div>
                            </div>
                        </template>
                    </div>

                    <form @submit.prevent="submitOrder()" class="space-y-5">
                        <div>
                            <h4 class="font-mono text-[10px] font-bold uppercase tracking-widest text-[#EA580C] pb-2 border-b border-[#0F0F10]/5 mb-3">/ DISPATCH DISPOSITION</h4>
                            <div class="space-y-3">
                                <input type="text" x-model="customerName" placeholder="Full Name" required class="w-full bg-[#FAF6F0] border border-[#0F0F10]/10 p-3.5 rounded-xl text-xs font-bold outline-none text-black">
                                <input type="tel" x-model="customerPhone" placeholder="Phone (WhatsApp Terminal)" required class="w-full bg-[#FAF6F0] border border-[#0F0F10]/10 p-3.5 rounded-xl text-xs font-bold outline-none text-black">
                                <input type="text" x-model="customerAddress" placeholder="Complete Shipping Address" required class="w-full bg-[#FAF6F0] border border-[#0F0F10]/10 p-3.5 rounded-xl text-xs font-bold outline-none text-black">
                            </div>
                        </div>
                        
                        <div>
                            <label class="font-mono text-[9px] font-bold text-[#0F0F10]/50 uppercase tracking-wider block mb-2">Payment System Matrix</label>
                            <div class="grid grid-cols-2 gap-3">
                                <div @click="paymentMethod = 'COD'" 
                                     class="cursor-pointer border p-4 rounded-2xl flex flex-col items-center justify-center gap-2 transition-all duration-300"
                                     :class="paymentMethod === 'COD' ? 'border-[#EA580C] bg-[#EA580C]/5 ring-1 ring-[#EA580C]' : 'border-[#0F0F10]/10 bg-[#FAF6F0]'">
                                    <span class="text-2xl drop-shadow-sm">💵</span>
                                    <span class="text-[10px] font-black text-[#0F0F10] uppercase tracking-wider text-center">Cash on Delivery</span>
                                </div>

                                <div @click="paymentMethod = 'CARD'" 
                                     class="cursor-pointer border p-4 rounded-2xl flex flex-col items-center justify-center gap-2 transition-all duration-300"
                                     :class="paymentMethod === 'CARD' ? 'border-[#0F0F10] bg-[#0F0F10] ring-1 ring-[#0F0F10] text-white' : 'border-[#0F0F10]/10 bg-[#FAF6F0] text-[#0F0F10]'">
                                    <span class="text-2xl drop-shadow-sm">💳</span>
                                    <span class="text-[10px] font-black uppercase tracking-wider text-center" :class="paymentMethod === 'CARD' ? 'text-white' : 'text-[#0F0F10]'">Credit / Debit</span>
                                </div>
                            </div>
                        </div>

                        <div x-show="paymentMethod === 'CARD'" x-transition class="pt-2">
                            <div class="p-5 rounded-2xl border border-[#0F0F10]/10 bg-white space-y-4 shadow-xl relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-1 bg-[#EA580C]"></div>
                                <p class="font-mono text-[9px] font-black text-[#EA580C] uppercase tracking-wider">Secure Payment Gateway</p>
                                <input type="text" placeholder="Card Number (0000 0000 0000 0000)" class="w-full bg-[#FAF6F0] border border-[#0F0F10]/10 p-3.5 rounded-xl text-xs font-bold outline-none text-black text-center tracking-[0.2em]">
                                <div class="flex gap-3">
                                    <input type="text" placeholder="MM/YY" class="w-1/2 bg-[#FAF6F0] border border-[#0F0F10]/10 p-3.5 rounded-xl text-xs font-bold outline-none text-black text-center tracking-widest">
                                    <input type="text" placeholder="CVV" class="w-1/2 bg-[#FAF6F0] border border-[#0F0F10]/10 p-3.5 rounded-xl text-xs font-bold outline-none text-black text-center tracking-widest">
                                </div>
                            </div>
                        </div>

                        <div class="bg-[#FAF6F0] border border-[#0F0F10]/10 rounded-2xl p-5 mt-2 space-y-2.5 text-xs font-medium shadow-sm">
                            <div class="flex justify-between text-[#0F0F10]/60"><span>Subtotal:</span><span class="font-bold text-[#0F0F10]" x-text="'Rs ' + cartSubtotal.toLocaleString()"></span></div>
                            <div class="flex justify-between text-[#0F0F10]/60"><span>Delivery Charges:</span><span class="font-bold text-[#0F0F10]" x-text="'Rs ' + deliveryCharges"></span></div>
                            <div class="flex justify-between items-center border-t border-[#0F0F10]/10 pt-3 mt-1 text-[#0F0F10]">
                                <span class="font-bold uppercase tracking-wider text-[10px]">Total Bill Amount:</span>
                                <span class="heading-elite text-lg text-[#EA580C]" x-text="'Rs ' + cartTotal.toLocaleString()"></span>
                            </div>
                        </div>
                    </form>
                </div>
                
                <div class="p-6 border-t border-[#0F0F10]/5 bg-white shrink-0 z-10">
                    <button @click="submitOrder()" :disabled="orderLoading" class="w-full bg-[#0F0F10] text-white font-bold py-4.5 rounded-2xl text-xs tracking-widest uppercase hover:bg-[#EA580C] transition-all duration-300 flex justify-center items-center gap-2">
                        <span x-show="orderLoading">TRANSMITTING... ⏳</span>
                        <span x-show="!orderLoading">PLACE ORDER 🚀</span>
                    </button>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
