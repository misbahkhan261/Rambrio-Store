<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rambrio Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-white text-black font-sans selection:bg-black selection:text-white" x-data="storeCore()" x-init="init()">

    <header class="fixed top-0 left-0 w-full z-40 transition-all duration-300 border-b border-gray-100"
            :class="scrolled ? 'bg-white/80 backdrop-blur-md py-4' : 'bg-white py-6'">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="#" class="text-xl font-black tracking-tighter uppercase">Rambrio™</a>
            <div class="flex items-center gap-6">
                <button @click="cartOpen = true" class="relative font-bold text-sm uppercase tracking-wider flex items-center gap-1.5">
                    Bag (<span x-text="cartCount"></span>)
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 pt-32 pb-24">
        <div class="mb-12">
            <span class="text-xs font-mono text-gray-400 uppercase tracking-widest">// Curated Ecosystem</span>
            <h2 class="text-3xl font-black tracking-tight uppercase mt-1">Featured Releases</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="product in products" :key="product.id">
                <div class="group border border-gray-100 rounded-xl p-4 flex flex-col justify-between transition-all hover:shadow-xl hover:border-gray-200">
                    <div>
                        <div class="aspect-square bg-gray-50 rounded-lg overflow-hidden mb-4 relative">
                            <span class="absolute top-3 left-3 bg-black text-white text-[10px] font-mono px-2 py-0.5 rounded uppercase tracking-wider" x-text="product.tag"></span>
                            <img :src="product.img1" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" alt="Product Image">
                        </div>
                        <h3 class="font-bold text-lg text-gray-900 uppercase tracking-tight" x-text="product.name"></h3>
                        <div class="flex items-baseline gap-2 mt-1">
                            <span class="text-sm font-black text-black">Rs <span x-text="product.price"></span></span>
                            <template x-if="product.compareAt > 0">
                                <span class="text-xs text-gray-400 line-through">Rs <span x-text="product.compareAt"></span></span>
                            </template>
                        </div>
                    </div>
                    <button @click="addToCart(product)" class="w-full mt-6 bg-black text-white text-xs font-bold uppercase tracking-wider py-3 rounded-lg hover:bg-gray-900 transition">
                        Add to Bag +
                    </button>
                </div>
            </template>
        </div>
    </main>

    <div x-show="cartOpen" x-cloak class="fixed inset-0 z-50 overflow-hidden" aria-labelledby="slide-over-title" role="dialog" aria-modal="true">
        <div class="absolute inset-0 overflow-hidden">
            <div x-show="cartOpen" x-transition:enter="ease-in-out duration-500" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="ease-in-out duration-500" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" @click="cartOpen = false" class="absolute inset-0 bg-gray-500/30 backdrop-blur-sm transition-opacity"></div>

            <div class="pointer-events-none fixed inset-y-0 right-0 flex max-w-full pl-10">
                <div x-show="cartOpen" x-transition:enter="transform transition ease-in-out duration-500 sm:duration-700" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" x-transition:leave="transform transition ease-in-out duration-500 sm:duration-700" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full" class="pointer-events-auto w-screen max-w-md bg-white p-6 shadow-2xl flex flex-col justify-between border-l border-gray-100">
                    
                    <div class="flex items-start justify-between border-b pb-4">
                        <h2 class="text-lg font-black uppercase tracking-tight text-gray-900">Your Bag (<span x-text="cartCount"></span>)</h2>
                        <button @click="cartOpen = false" class="text-gray-400 hover:text-black font-bold uppercase text-xs tracking-wider">Close ✕</button>
                    </div>

                    <div class="flex-1 overflow-y-auto my-4 space-y-4 pr-1">
                        <template x-if="cart.length === 0">
                            <div class="h-full flex flex-col items-center justify-center text-center py-12">
                                <span class="text-3xl">🛒</span>
                                <p class="text-sm font-bold text-gray-400 uppercase tracking-wider mt-2">Your ecosystem is empty</p>
                            </div>
                        </template>

                        <template x-for="item in cart" :key="item.id">
                            <div class="flex items-center justify-between border border-gray-100 p-3 rounded-lg bg-gray-50/50">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 bg-white rounded border overflow-hidden">
                                        <img :src="item.img1" class="w-full h-full object-cover">
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-xs text-gray-900 uppercase tracking-tight" x-text="item.name"></h4>
                                        <p class="text-[11px] text-gray-500">Rs <span x-text="item.price"></span> x <span x-text="item.qty"></span></p>
                                    </div>
                                </div>
                                <span class="text-xs font-black text-black">Rs <span x-text="item.price * item.qty"></span></span>
                            </div>
                        </template>
                    </div>

                    <div class="space-y-4 border-t pt-4 text-black">
                        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400">// Dispatch Info</h3>
                        
                        <div class="space-y-2">
                            <input type="text" x-model="customerName" placeholder="Full Name" class="w-full p-3 border rounded-lg bg-white text-black text-sm focus:outline-none focus:ring-1 focus:ring-black">
                            <input type="email" x-model="customerEmail" placeholder="Email Address" class="w-full p-3 border rounded-lg bg-white text-black text-sm focus:outline-none focus:ring-1 focus:ring-black">
                            <input type="text" x-model="customerPhone" placeholder="Phone (WhatsApp Terminal)" class="w-full p-3 border rounded-lg bg-white text-black text-sm focus:outline-none focus:ring-1 focus:ring-black">
                            <input type="text" x-model="customerAddress" placeholder="Complete Physical Shipping Address" class="w-full p-3 border rounded-lg bg-white text-black text-sm focus:outline-none focus:ring-1 focus:ring-black">
                        </div>

                        <p class="text-[9px] font-mono text-gray-400 mt-2 uppercase tracking-widest">Payment System Matrix</p>
                        <select x-model="paymentMethod" class="w-full p-3 border rounded-lg bg-white text-black text-sm font-bold focus:outline-none">
                            <option value="COD">Cash on Delivery (COD)</option>
                        </select>

                        <div class="mt-2 p-3 bg-gray-50 rounded-lg space-y-1 text-xs text-black border border-gray-100">
                            <div class="flex justify-between"><span>Subtotal:</span><span class="font-bold">Rs <span x-text="cartTotal"></span></span></div>
                            <div class="flex justify-between"><span>Delivery Charges:</span><span class="font-bold">Rs 399</span></div>
                            <div class="flex justify-between text-sm font-black border-t pt-1.5 text-orange-600 mt-1">
                                <span>TOTAL BILL AMOUNT:</span><span>Rs <span x-text="cartTotal > 0 ? (cartTotal + 399) : 0"></span></span>
                            </div>
                        </div>

                        <button @click="placeOrder()" 
                                class="w-full mt-2 bg-black text-white py-4 rounded-lg font-bold uppercase text-xs tracking-wider hover:bg-gray-900 transition flex justify-center items-center gap-2">
                            <span x-show="orderState === 'loading'">Processing... ⏳</span>
                            <span x-show="orderState !== 'loading'">Place Order Via Railway 🚀</span>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="store-app.js"></script>
</body>
</html>
